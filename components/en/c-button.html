<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Spec Canvas — Button</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="../../assets/css/admin-real.css">
<link rel="stylesheet" href="../../assets/css/harness-chrome.css">
</head><body>
<header class="cmp-top"><h1>Button</h1></header>
<main class="cmp-stage">
<div class='cmp-row'><span class='cmp-lbl'>solid</span>
<button class="flex items-center justify-center gap-x-[4px] transition-colors focus-visible:outline-none disabled:pointer-events-none disabled:opacity-50 disabled:bg-background-interactive-tertiary disabled:text-text-interactive-tertiary bg-background-interactive-primary text-white hover:bg-blue-700 px-[12px] py-[10px] rounded-s single-line-btn-3 max-h-[34px] relative">blue</button>
<button class="flex items-center justify-center gap-x-[4px] transition-colors focus-visible:outline-none disabled:pointer-events-none disabled:opacity-50 disabled:bg-background-interactive-tertiary disabled:text-text-interactive-tertiary bg-background-interactive-secondary text-white hover:bg-gray-900 px-[12px] py-[10px] rounded-s single-line-btn-3 max-h-[34px] relative">black</button>
<button class="flex items-center justify-center gap-x-[4px] transition-colors focus-visible:outline-none disabled:pointer-events-none disabled:opacity-50 disabled:bg-background-interactive-tertiary disabled:text-text-interactive-tertiary bg-background-interactive-tertiary text-text-interactive-secondary hover:bg-gray-300 px-[12px] py-[10px] rounded-s single-line-btn-3 max-h-[34px] relative">light-gray</button>
<button class="flex items-center justify-center gap-x-[4px] transition-colors focus-visible:outline-none disabled:pointer-events-none disabled:opacity-50 disabled:bg-background-interactive-tertiary disabled:text-text-interactive-tertiary bg-white text-text-interactive-secondary hover:bg-gray-100 px-[12px] py-[10px] rounded-s single-line-btn-3 max-h-[34px] relative">white</button>
</div>

<div class='cmp-row'><span class='cmp-lbl'>outline</span>
<button class="flex items-center justify-center gap-x-[4px] transition-colors focus-visible:outline-none disabled:pointer-events-none disabled:opacity-50 border bg-white hover:bg-black/5 disabled:border-interactive-tertiary disabled:text-text-interactive-tertiary border-border-interactive-primary text-text-interactive-primary hover:bg-blue-50 px-[12px] py-[10px] rounded-s single-line-btn-3 max-h-[34px] relative">blue</button>
<button class="flex items-center justify-center gap-x-[4px] transition-colors focus-visible:outline-none disabled:pointer-events-none disabled:opacity-50 border bg-white hover:bg-black/5 disabled:border-interactive-tertiary disabled:text-text-interactive-tertiary border-border-interactive-secondary text-text-interactive-secondary hover:bg-gray-50 px-[12px] py-[10px] rounded-s single-line-btn-3 max-h-[34px] relative">black</button>
<button class="flex items-center justify-center gap-x-[4px] transition-colors focus-visible:outline-none disabled:pointer-events-none disabled:opacity-50 border bg-white hover:bg-black/5 disabled:border-interactive-tertiary disabled:text-text-interactive-tertiary border-border-interactive-quaternary text-text-interactive-secondary hover:bg-gray-50 px-[12px] py-[10px] rounded-s single-line-btn-3 max-h-[34px] relative">light-gray</button>
<button class="flex items-center justify-center gap-x-[4px] transition-colors focus-visible:outline-none disabled:pointer-events-none disabled:opacity-50 border bg-white hover:bg-black/5 disabled:border-interactive-tertiary disabled:text-text-interactive-tertiary border-white text-text-interactive-secondary hover:bg-gray-50 px-[12px] py-[10px] rounded-s single-line-btn-3 max-h-[34px] relative">white</button>
</div>

<div class='cmp-row'><span class='cmp-lbl'>size</span>
<button class="flex items-center justify-center gap-x-[4px] transition-colors disabled:opacity-50 bg-background-interactive-primary text-white hover:bg-blue-700 px-[8px] py-[6px] rounded-s single-line-btn-4 max-h-[24px] relative">sm</button>
<button class="flex items-center justify-center gap-x-[4px] transition-colors disabled:opacity-50 bg-background-interactive-primary text-white hover:bg-blue-700 px-[12px] py-[10px] rounded-s single-line-btn-3 max-h-[34px] relative">md</button>
<button class="flex items-center justify-center gap-x-[4px] transition-colors disabled:opacity-50 bg-background-interactive-primary text-white hover:bg-blue-700 px-[14px] py-[12px] rounded-m single-line-btn-2 max-h-[40px] relative">lg</button>
<button class="flex items-center justify-center gap-x-[4px] transition-colors disabled:opacity-50 bg-background-interactive-primary text-white hover:bg-blue-700 px-[16px] py-[19px] rounded-m single-line-btn-1 max-h-[56px] relative">xl</button>
</div>

<div class='cmp-row'><span class='cmp-lbl'>status</span>
<button disabled class="flex items-center justify-center gap-x-[4px] transition-colors focus-visible:outline-none disabled:pointer-events-none disabled:opacity-50 disabled:bg-background-interactive-tertiary disabled:text-text-interactive-tertiary bg-background-interactive-primary text-white px-[12px] py-[10px] rounded-s single-line-btn-3 max-h-[34px] relative">disabled</button>
<button class="flex items-center justify-center gap-x-[4px] transition-colors disabled:opacity-50 bg-background-interactive-primary text-white hover:bg-blue-700 px-[12px] py-[10px] rounded-full single-line-btn-3 max-h-[34px] relative">rounded full</button>
</div>
</main></body></html>
