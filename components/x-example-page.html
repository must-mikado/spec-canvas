<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Spec Canvas — Example Page</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="../assets/css/admin-real.css">
<link rel="stylesheet" href="../assets/css/admin-components.css">
<style>/* 뷰어 미리보기 전용: admin-shell.js의 ≤1280px off-canvas(transform:translateX(-100%))를 무력화해 항상 노출 */
#adminShell{position:relative !important;transform:none !important;height:auto !important;box-shadow:none !important;z-index:auto !important;}</style>
</head><body style="background:#F8F9FC;">
<aside class="asb" id="adminShell" data-active="dashboard"></aside>
<main>
  <header class="h-[64px] flex items-center justify-between px-[24px]" style="background:#fff;border-bottom:1px solid #E5E7EB;">
    <h3 class="heading-3 [&]:leading-[28px] [&]:font-[600]">Spec Canvas</h3>
    <div class="flex items-center gap-x-[8px]">
      <div class="rounded-full bg-[#D1D5DB] size-8 border flex items-center justify-center heading-4"><span>관</span></div>
      <div>
        <div class="font-[500] text-[14px] leading-[20px]">관리자</div>
        <div class="font-[400] text-[12px] leading-[16px] text-[#6B7280]">user@example.com</div>
      </div>
    </div>
  </header>

  <div style="padding:24px 30px;">
    <!-- c-page-title 조합 -->
    <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between" style="margin-bottom:20px;">
      <h2 class="heading-1">대시보드</h2>
      <div class="flex items-center gap-2">
        <!-- c-search-input 조합 -->
        <div class="relative flex items-center" style="width:224px">
          <input placeholder="검색어 입력" class="flex h-[34px] w-full rounded-s border border-border-interactive-quaternary bg-white px-3 py-1 single-line-text-2 transition-colors placeholder:text-text-tertiary focus-visible:outline-none pr-8">
          <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-text-interactive-secondary"><svg class="size-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></button>
        </div>
        <!-- c-button 조합 -->
        <button type="button" class="flex items-center justify-center gap-x-[4px] transition-colors bg-background-interactive-primary text-white hover:bg-blue-700 px-[12px] py-[10px] rounded-s single-line-btn-3 max-h-[34px]">+ 추가</button>
      </div>
    </div>

    <!-- c-card 조합 x3 -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px;">
      <div class="bg-card text-card-foreground" style="border:1px solid #EAECF0;border-radius:12px;">
        <div class="flex flex-col space-y-1.5 p-6"><h3 class="text-2xl font-semibold leading-none tracking-tight">1,204</h3><p class="text-sm text-muted-foreground">Total Items</p></div>
      </div>
      <div class="bg-card text-card-foreground" style="border:1px solid #EAECF0;border-radius:12px;">
        <div class="flex flex-col space-y-1.5 p-6"><h3 class="text-2xl font-semibold leading-none tracking-tight">$82,140</h3><p class="text-sm text-muted-foreground">Total Revenue</p></div>
      </div>
      <div class="bg-card text-card-foreground" style="border:1px solid #EAECF0;border-radius:12px;">
        <div class="flex flex-col space-y-1.5 p-6"><h3 class="text-2xl font-semibold leading-none tracking-tight">98.2%</h3><p class="text-sm text-muted-foreground">Success Rate</p></div>
      </div>
    </div>

    <!-- c-sec-title + c-table + c-pagination 조합 -->
    <div class="bg-card" style="border:1px solid #EAECF0;border-radius:12px;padding:20px;">
      <h2 class="heading-4" style="margin:0 0 12px;">Recent Activity</h2>
      <div class="relative w-full overflow-auto">
        <table class="w-full caption-bottom text-sm">
          <thead class="[&_tr]:border-b bg-background-secondary">
            <tr class="border-b"><th class="h-[45px] text-center align-middle heading-6">생성일시</th><th class="h-[45px] text-center align-middle heading-6">ID</th><th class="h-[45px] text-center align-middle heading-6">금액</th><th class="h-[45px] text-center align-middle heading-6">상태</th></tr>
          </thead>
          <tbody class="[&_tr:last-child]:border-0">
            <tr class="border-b transition-colors hover:bg-muted/50"><td class="text-center body-3 h-[45px] px-2">2026-06-05 14:21</td><td class="text-center body-3 h-[45px] px-2">SAMPLE-0001</td><td class="text-center body-3 h-[45px] px-2">1,090,000</td><td class="text-center body-3 h-[45px] px-2"><span class="single-line-btn-3" style="padding:3px 8px;border-radius:6px;background:#DCFCE7;color:#15803D">Completed</span></td></tr>
            <tr class="border-b transition-colors hover:bg-muted/50"><td class="text-center body-3 h-[45px] px-2">2026-06-05 11:02</td><td class="text-center body-3 h-[45px] px-2">SAMPLE-0002</td><td class="text-center body-3 h-[45px] px-2">670,000</td><td class="text-center body-3 h-[45px] px-2"><span class="single-line-btn-3" style="padding:3px 8px;border-radius:6px;background:#FEF3C7;color:#B45309">Pending</span></td></tr>
            <tr class="border-b transition-colors hover:bg-muted/50"><td class="text-center body-3 h-[45px] px-2">2026-06-04 18:47</td><td class="text-center body-3 h-[45px] px-2">SAMPLE-0003</td><td class="text-center body-3 h-[45px] px-2">340,000</td><td class="text-center body-3 h-[45px] px-2"><span class="single-line-btn-3" style="padding:3px 8px;border-radius:6px;background:#DCFCE7;color:#15803D">Completed</span></td></tr>
          </tbody>
        </table>
      </div>
      <div class="mt-6 flex w-full justify-center">
        <div class="flex w-full max-w-max gap-2 rounded-md text-black">
          <button type="button" aria-label="Previous"><svg class="size-5 text-[#4F5565]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></button>
          <p class="flex items-center text-caption text-black">
            <button type="button" class="h-6 min-w-[30px] px-1 mx-1 text-center heading-6 underline underline-offset-4">1</button>
            <button type="button" class="h-6 min-w-[30px] px-1 mx-1 text-center text-caption">2</button>
            <button type="button" class="h-6 min-w-[30px] px-1 mx-1 text-center text-caption">3</button>
          </p>
          <button type="button" aria-label="Next"><svg class="size-5 text-[#4F5565]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></button>
        </div>
      </div>
    </div>
  </div>
</main>
<script src="../assets/js/admin-shell.js"></script>
</body></html>
